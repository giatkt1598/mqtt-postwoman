services:
  app:
    build: .
    ports:
      - "6010:3000"
    environment:
      - PORT=3000
      - SQLITE_PATH=/data/mqtt-postwoman.db
      - MQTT_POSTWOMAN_ORIGIN=http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/data/app:/data
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/data/mosquitto:/mosquitto/data

  mosquitto-2:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/data/mosquitto-2:/mosquitto/data

  mosquitto-3:
    image: eclipse-mosquitto:2
    ports:
      - "1885:8883"
      - "8085:8083"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/mosquitto-tls.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/certs:/mosquitto/certs:ro
      - ./docker/data/mosquitto-3:/mosquitto/data
