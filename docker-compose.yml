services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SQLITE_PATH=/data/mqtt-postwoman.db
      - MQTT_POSTWOMAN_ORIGIN=http://localhost:5173
    volumes:
      - app-data:/data
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mosquitto-2:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"

volumes:
  app-data:
