services:
  app:
    build: .
    ports:
      - "6010:3000"
    environment:
      - PORT=3000
      - SQLITE_PATH=/data/mqtt-postwoman.db
      - MQTT_POSTWOMAN_ORIGIN=http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-data:/data
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mosquitto-2:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mosquitto-3:
    image: eclipse-mosquitto:2
    ports:
      - "1885:1883"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mosquitto-4:
    image: eclipse-mosquitto:2
    ports:
      - "1886:8883"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/mosquitto-tls.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/certs:/mosquitto/certs:ro

volumes:
  app-data:
